<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modal Link Opener</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .domain-info {
      padding: 10px;
      background-color: #f5f5f5;
      border-radius: 4px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .exclusion-section {
      margin-top: 10px;
    }
    .exclusion-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .exclusion-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
    .remove-btn {
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .remove-btn:hover {
      background-color: #d32f2f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3 id="extension-title">Modal Link Opener</h3>
    <div class="domain-info">
      <div id="domain-label">当前域名: <span id="current-domain"></span></div>
    </div>
    <div class="toggle-container">
      <span id="toggle-label">添加到排除名单</span>
      <label class="toggle">
        <input type="checkbox" id="exclusion-toggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="exclusion-section">
      <div id="list-title" class="exclusion-title">排除名单域名</div>
      <div id="exclusion-list"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
